<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dimensionamento</title>
    <!-- Fonte -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- CSS específico -->
    <link rel="stylesheet" href="dimensionamento.css">
</head>
<body>
    <main>
        <!-- Cabeçalho -->
        <header class="header">
            <a href="../encarregadas.html" class="logo-link">
                <img src="../../img/icone.png" alt="Logo Manserv" class="logo">
            </a>
            <h1>Dimensionamento</h1>
        </header>

        <!-- Informações -->
        <section id="info">
            <h2>Informações</h2>
            <label>Data: <input type="date" id="dataRecebimento"></label>
            <label>
              <span>Responsável:</span>
                  <select id="responsavel" name="responsavel">
                      <option value="" disabled selected>Selecione o nome</option>
                      <option value="Graciela">Graciela</option>
                      <option value="Giovana">Giovana</option>
                      <option value="Jéssica">Jéssica</option>
                      <option value="Alisson">Alisson</option>
                      <option value="Daiane">Daiane</option>
                </select>
            </label>
        </section>

        <!-- Setores -->
        <section id="setor">
            <h2>Setores</h2>
            <label>5º Andar - Prolongados: <input type="text" id="v5PL" placeholder="Nome:"></label>
            <label>5º Andar - Giro rápido: <input type="text" id="v5GR" placeholder="Nome:"></label>
            <label>5º Andar - UTI: <input type="text" id="v5UTI" placeholder="Nome:"></label>
            <br>
            <label>4º Andar - lado A: <input type="text" id="v4A" placeholder="Nome:"></label>
            <label>4º Andar - lado B: <input type="text" id="v4B" placeholder="Nome:"></label>
            <br>
            <label>3º Andar: <input type="text" id="v3A" placeholder="Nome:"></label>
            <br>
            <label>2º Andar/Bloco: <input type="text" id="v2bloco" placeholder="Nome:"></label>
            <br>
            <label>Saúde mental - Feminina: <input type="text" id="usr" placeholder="Nome:"></label>
            <label>Saúde mental - Masculina: <input type="text" id="usm" placeholder="Nome:"></label>
            <br>
            <label>Térreos - Internação e ADM: <input type="text" id="terreos" placeholder="Nome:"></label>
            <label>Rouparia: <input type="text" id="rouparia" placeholder="Nome:"></label>
            <br>
            <label>Resíduos / Área suja: <input type="text" id="residuos" placeholder="Nome:"></label>
        </section>

        <!-- Botões -->
        <button id="gerarBtn" class="login-option">Gerar Mensagem</button>

        <!-- Mensagem gerada -->
        <section id="mensagem">
            <h2>Mensagem gerada:</h2>
            <textarea id="resultado" rows="15" readonly></textarea>
            <button id="copiarBtn" class="login-option">📋 Copiar Mensagem</button>
        </section>
    </main>

    <footer class="footer">
        <p>© 2025 <strong>Manserv - Equipe HSANA</strong>. Todos os direitos reservados.</p>
    </footer>

    <!-- JS -->
    <script src="dimensionamento.js"></script>
    <script src="sheet.js"></script>
</body>
</html>
